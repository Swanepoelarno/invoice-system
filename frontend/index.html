<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invoice System</title>
    <!-- Modern font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Charts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  </head>
  <body>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-logo">IS</div>
      <nav class="sidebar-nav">
        <div class="nav-item active" onclick="showView('dashboard', this)">
          <i class="fas fa-chart-pie"></i>
          <span>Dashboard</span>
        </div>
        <div class="nav-item" onclick="showView('quotes', this)">
          <i class="fas fa-file-alt"></i>
          <span>Quotes</span>
        </div>
        <div class="nav-item" onclick="showView('invoices', this)">
          <i class="fas fa-file-invoice-dollar"></i>
          <span>Invoices</span>
        </div>
        <div class="nav-item nav-item-logout" onclick="logout()">
          <i class="fas fa-sign-out-alt"></i>
          <span>Logout</span>
        </div>
      </nav>
    </div>
    <!-- Main Content -->
    <div class="main">

      <!-- Dashboard View -->
      <div id="view-dashboard" class="view active">
        <h1>Dashboard</h1>
        <div class="dashboard">
          <div class="dashboard-card">
            <p class="dashboard-label">Total Invoiced</p>
            <p class="dashboard-value" id="totalInvoiced">R0</p>
          </div>
          <div class="dashboard-card">
            <p class="dashboard-label">Total Paid</p>
            <p class="dashboard-value" id="totalPaid">R0</p>
          </div>
          <div class="dashboard-card">
            <p class="dashboard-label">Outstanding</p>
            <p class="dashboard-value" id="totalOutstanding">R0</p>
          </div>
        </div>
        <div class="chart-container">
          <canvas id="paymentChart"></canvas>
        </div>
      </div>

      <!-- Quotes View -->
      <div id="view-quotes" class="view">
        <h1>Quotes</h1>

        <h2>Create New Quote</h2>
        <form id="quoteForm">
          <label>Client Name</label>
          <input type="text" id="clientName" placeholder="Enter client name">

          <label>Service Description</label>
          <input type="text" id="serviceDescription" placeholder="Describe the service">

          <label>Date</label>
          <input type="date" id="quoteDate">

          <label>Amount (R)</label>
          <input type="number" id="amount" placeholder="0.00">

          <label>Final Amount <span style="font-size:11px; font-weight:normal; color:#888;">— VAT included</span></label>
          <input type="number" id="finalAmount" placeholder="0.00" readonly>

          <br><br>
          <button type="submit">Save Quote</button>
        </form>

        <h2 id="quotesHeading" style="display:none; margin-top:40px;">Saved Quotes</h2>
        <div id="quotesList"></div>
      </div>

      <!-- Invoices View -->
      <div id="view-invoices" class="view">
        <h1>Invoices</h1>
        <div id="invoicesList"></div>
      </div>

    </div>

    <script src="app.js"></script>
  </body>
</html>
